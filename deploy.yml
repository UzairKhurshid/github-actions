name: Deploy to ECS Fargate

on:
  workflow_dispatch:
    inputs:
      TEST_RUN:
        description: 'Run workflow in test mode'
        required: true
        default: 'true'

      TARGET:
        description: 'What to deploy (server | worker | all)'
        required: true
        default: 'all'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # ================================
      # 🧪 TEST MODE
      # ================================
      - name: Test AWS Step (skip if TEST_RUN)
        if: github.event.inputs.TEST_RUN == 'true'
        run: |
          echo "✅ TEST_RUN is enabled. Skipping AWS steps."
          echo "Target: ${{ github.event.inputs.TARGET }}"
          echo "Workflow ran successfully!"

      # ================================
      # ☁️ AWS CONFIG
      # ================================
      - name: Configure AWS credentials
        if: github.event.inputs.TEST_RUN != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # ================================
      # 🚀 DEPLOY SERVER
      # ================================
      - name: Deploy Server Service
        if: github.event.inputs.TEST_RUN != 'true' && (github.event.inputs.TARGET == 'server' || github.event.inputs.TARGET == 'all')
        run: |
          echo "🚀 Deploying SERVER ECS service"
          
          # Example steps (replace with your real pipeline)
          # docker build -t server-image .
          # docker tag server-image:latest <ECR_SERVER_IMAGE>
          # docker push <ECR_SERVER_IMAGE>
          # aws ecs update-service --cluster <cluster> --service <server-service> --force-new-deployment

      # ================================
      # 👷 DEPLOY WORKER
      # ================================
      - name: Deploy Worker Service
        if: github.event.inputs.TEST_RUN != 'true' && (github.event.inputs.TARGET == 'worker' || github.event.inputs.TARGET == 'all')
        run: |
          echo "👷 Deploying WORKER ECS service"
          
          # Example steps (replace with your real pipeline)
          # docker build -t worker-image .
          # docker tag worker-image:latest <ECR_WORKER_IMAGE>
          # docker push <ECR_WORKER_IMAGE>
          # aws ecs update-service --cluster <cluster> --service <worker-service> --force-new-deployment